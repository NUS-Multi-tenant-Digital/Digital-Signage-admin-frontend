# Frontend DAST — runs on the same events as ci.yml (push to main, PR into main).
# Builds the app, serves via `npm run preview`, then OWASP ZAP Baseline scans localhost.
name: Frontend Security (DAST)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  zap-baseline:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # Existing script: "preview": "vite preview" (port 3000 in vite.config.js).
      - name: Start Vite preview server
        run: |
          npm run preview -- --host 127.0.0.1 --port 3000 &
          echo "Waiting for http://127.0.0.1:3000 ..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/ >/dev/null; then
              echo "Frontend is up."
              exit 0
            fi
            sleep 2
          done
          echo "Preview server did not become ready in time."
          exit 1

      - name: OWASP ZAP Baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://127.0.0.1:3000'
          cmd_options: '-a -j'
          fail_action: false
          allow_issue_writing: false
